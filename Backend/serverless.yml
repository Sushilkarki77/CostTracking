service: costtracking-api

provider:
  name: aws
  runtime: nodejs18.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'prod'}

  # Injected into the Lambda runtime. In CI these come from SSM Parameter Store
  # (see infra/pipeline.yml). Locally, dotenv still loads them from .env.
  environment:
    MONGO_URI: ${env:MONGO_URI, ''}
    SECRET_KEY: ${env:SECRET_KEY, ''}
    SECRET_KEY_REFRESH: ${env:SECRET_KEY_REFRESH, ''}

  httpApi:
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: false

functions:
  api:
    handler: dist/serverless.handler
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000   # You can change the port if needed
    lambdaPort: 3002 # Optional, for lambda invoke endpoint
